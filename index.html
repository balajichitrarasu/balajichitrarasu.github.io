<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balaji Chitrarasu | Portfolio</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loader">
    <div class="loader-text">Balaji Chitrarasu</div>
</div>

<div id="particles-js"></div>
<div id="cursor-glow"></div>

<!-- NAV -->
<nav class="navbar" id="navbar">
    <div class="nav-inner">
        <a class="nav-brand" href="#">Portfolio</a>
        <button class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </button>
        <ul id="navMenu">
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </div>
</nav>

<!-- HERO -->
<header class="hero">
    <div class="hero-content">
        <img src="profile.jpg" class="profile">
        <h1 class="hero-name" id="typing"></h1>
        <p class="hero-sub">Hardware & Software Engineer</p>
    </div>
</header>

<!-- ABOUT -->
<section id="about" class="section fade-in">
    <h2 class="section-title">About Me</h2>
    <div class="glass-card">
        Hardware & Software Engineer. Expert in PC repair, networking, electronics and trading systems.
    </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section">
    <h2 class="section-title">Projects</h2>
    <div class="projects-grid">

        <div class="project-card fade-in" onclick="openPopup('Custom PC Build','Built high performance custom PC')">
            <div class="project-img-wrap">
                <img src="project1.jpg">
            </div>
            <div class="project-info">
                <h3>Custom PC Build</h3>
            </div>
        </div>

        <div class="project-card fade-in" onclick="openPopup('Office Network','Configured office LAN network')">
            <div class="project-img-wrap">
                <img src="project2.jpg">
            </div>
            <div class="project-info">
                <h3>Office Network</h3>
            </div>
        </div>

    </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section fade-in">
    <h2 class="section-title">Contact</h2>
    <div class="glass-card">
        Email: balajihck20@gmail.com
    </div>
</section>

<!-- POPUP -->
<div id="popup" class="popup">
    <div class="popup-content">
        <span class="popup-close" onclick="closePopup()">×</span>
        <h2 id="popup-title"></h2>
        <p id="popup-text"></p>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="script.js"></script>

</body>
</html>
